# Welcome to the Red Hat System Administration - KVM Kickstart file
# Rhel 9.2 & 10.x - 2026

# Requirements
# KVM Network source = NAT required in order to get internet access
# Rocky or Rhel 9.2+ / 10.x version, iso mounted in sata cdrom.
# Memory 2048Mib
# Disk space 20Gb

%pre --interpreter=/bin/bash
# Detect the installer major version and emit compatible Kickstart fragments.
RHEL_MAJOR=9

if [ -r /etc/os-release ]; then
  . /etc/os-release
  case "$VERSION_ID" in
    10*|9*)
      RHEL_MAJOR="${VERSION_ID%%.*}"
      ;;
  esac
fi

if [ "$RHEL_MAJOR" = "10" ]; then
  cat > /tmp/install-compat.ks <<'EOF'
eula --agreed
graphical --non-interactive
EOF

  cat > /tmp/storage-compat.ks <<'EOF'
ignoredisk --only-use=sda
clearpart --all --initlabel --disklabel=gpt --drives=sda
reqpart
EOF
else
  : > /tmp/install-compat.ks

  cat > /tmp/storage-compat.ks <<'EOF'
clearpart --all --initlabel --drives=sda
EOF
fi
%end

lang en_US
keyboard --xlayouts='us'
timezone America/New_York --utc
%include /tmp/install-compat.ks

# root password = course
# student password = student|rhsacourse
rootpw --iscrypted $6$1mjxev44xLuawTM/$eaKHl8NHDO6hI1eFQoqprCCJSH./29Hx8z4lEPTKfbH9BKeV4RA2gARwc1e7ZY53pjFA3Lj5mniekuGoXlz0c.
#user --groups=wheel --name=student --password=$6$vc.cBB/8OZTG45bY$khg8VjVgJsiwF/lYMKits2rDopsHL7S5FW2Ifgtbog8IF8TRaSjbT0llcc1emgzITW2SxsRMbkD11yiykdiEU0 --iscrypted --gecos="student"
user --groups=wheel --name=student --password=$6$hc.rUF5AXXgjPHGa$KFij.axK7rYp3T/Ew5a4Kc8GJmR9xibJeTZHzRe6nFJl3STg0n5nBPYg3IXhwkuYu7g6g6Oq5xQF3GZAHLrLE0 --iscrypted --gecos="student"

reboot
cdrom
bootloader --append="rhgb quiet crashkernel=1G-4G:192M,4G-64G:256M,64G-:512M"
zerombr
%include /tmp/storage-compat.ks

# Disk size 20G is required
part /boot --fstype=xfs --ondisk=sda --size=1024
part pv.0 --fstype=lvmpv --ondisk=sda --size=16200
volgroup vg_rhcsa --pesize=4096 pv.0
logvol / --fstype="xfs" --size=12288 --name=root --vgname=vg_rhcsa
logvol swap --fstype="swap" --size=2047 --name=swap --vgname=vg_rhcsa
network --device=enp0s3 --hostname=client.labs.com --bootproto=static --ip=10.0.2.11 --netmask=255.255.255.0 --gateway=10.0.2.2 --nameserver=8.8.8.8
firstboot --enable
selinux --disabled
firewall --disable 

%packages
@^graphical-server-environment
initial-setup
gcc
make
kernel-devel
kernel-headers
wget

%end
%post --log=/var/log/rhsa_course_installation.log
wget https://www.rhsacourse.top/rpm/rhsa-2.0-1.el9.noarch.rpm -O /tmp/rhsa-course.rpm
if [ -e /tmp/rhsa-course.rpm ]; then
  echo "rhsa-course detected"
  rpm -ivh /tmp/rhsa-course.rpm
  rm -f /tmp/rhsa-course.rpm
else
  wget https://www.rhsacourse.top/rpm/rhsa-2.0-1.el9.noarch.rpm -O rhsa-course.rpm
  rpm -ivh rhsa-course.rpm
  rm -f rhsa-course.rpm
fi
%end
